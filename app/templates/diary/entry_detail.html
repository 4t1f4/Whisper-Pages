{% extends "base.html" %}
{% block title %}Entry Detail{% endblock %}

{% block content %}

<h1>{{ entry.title }}</h1>

<p>{{ entry.content }}</p>

<p>{{ entry.created_at }}</p>

<form
    action="{{ url_for('diary.delete_entry', id=entry.id) }}"
    method="POST"
>

    <button type="submit">
        Delete Entry
    </button>

</form>

{% endblock %}
