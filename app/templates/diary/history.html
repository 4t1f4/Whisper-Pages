{% extends "base.html" %}
{% block title %}History{% endblock %}

{% block content %}

<h1>My Entries</h1>

{% for entry in entries %}

    <a href="{{ url_for('diary.entry_detail', id=entry.id) }}">
      {{ entry.title }}
    </a>

    <p>{{ entry.content }}</p>

    <hr>

{% endfor %}

{% endblock %}
