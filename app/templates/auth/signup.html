{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block extra_css %}
<style>
    .form-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .form-footer {
        margin-top: 25px;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-body);
        opacity: 0.9;
    }

    /* Centers the submit button cleanly */
    .form-actions {
        margin-top: 25px;
        display: flex;
        justify-content: center;
    }



    .password-container{
        position: relative;
        width: 100%;
    }

    .password-container input{
        width: 100%;
        padding-right: 45px; /* Space for the eye icon */
    }

    .password-container button{
        position: absolute;
        top: 50%;
        right: 12px;
        transform: translateY(-50%);

        background: transparent;
        border: none;
        cursor: pointer;

        color: var(--text-body);
        font-size: 1rem;
        padding: 0;
    }

    .password-container button:hover{
        color: var(--text-main);
    }

</style>
{% endblock %}

{% block content %}
<div class="form-header">
    <h1>Sign Up</h1>
    <p>Begin your journey into a quieter space.</p>
</div>

<form action="{{ url_for('auth.signup') }}" method="POST">

    <label for="username">Username</label>
    <input
        type="text" 
        oninput="this.value = this.value.toLowerCase();"
        id="username"
        name="username"
        placeholder="Choose a unique username"
        required
    >

    <label for="email">Email Address</label>
    <input
        type="email"
        id="email"
        name="email"
        placeholder="yourname@example.com"
        required
    >

    <label for="password">Password</label>
    <div class="password-container">
        <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a strong password"
            required
        >
        <button type="button" id="togglePassword">
            <i class="fa-solid fa-eye"></i>
        </button>
    </div>

    <label for="confirm_password">Confirm Password</label>
    <div class="password-container">
        <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Repeat your password"
            required
        >
        <button type="button" id="toggleConfirmPassword">
            <i class="fa-solid fa-eye"></i>
        </button>
    </div>

    <div class="form-actions">
        <button type="submit">Sign Up</button>
    </div>

</form>

<hr>

<div class="form-footer">
    Already have an account? <a href="{{ url_for('auth.login') }}">Log in here</a>
</div>

<script>
    function setupPasswordToggle(inputId, buttonId) {

        const password = document.getElementById(inputId);
        const toggle = document.getElementById(buttonId);

        toggle.addEventListener("click", () => {

            if (password.type === "password") {

                password.type = "text";
                toggle.innerHTML = '<i class="fa-solid fa-eye-slash"></i>';

            } else {

                password.type = "password";
                toggle.innerHTML = '<i class="fa-solid fa-eye"></i>';

            }

        });

    }

    setupPasswordToggle("password", "togglePassword");
    setupPasswordToggle("confirm_password", "toggleConfirmPassword");
</script>

{% endblock %}
