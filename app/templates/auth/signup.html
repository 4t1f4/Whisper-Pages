{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block extra_css %}
<style>
    .form-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .form-footer {
        margin-top: 25px;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-body);
        opacity: 0.9;
    }

    /* Centers the submit button cleanly */
    .form-actions {
        margin-top: 25px;
        display: flex;
        justify-content: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-header">
    <h1>Sign Up</h1>
    <p>Begin your journey into a quieter space.</p>
</div>

<form action="{{ url_for('auth.signup') }}" method="POST">

    <label for="username">Username</label>
    <input
        type="text" 
        oninput="this.value = this.value.toLowerCase();"
        id="username"
        name="username"
        placeholder="Choose a unique username"
        required
    >

    <label for="email">Email Address</label>
    <input
        type="email"
        id="email"
        name="email"
        placeholder="yourname@example.com"
        required
    >

    <label for="password">Password</label>
    <input
        type="password"
        id="password"
        name="password"
        placeholder="Create a strong password"
        required
    >

    <label for="confirm_password">Confirm Password</label>
    <input
        type="password"
        id="confirm_password"
        name="confirm_password"
        placeholder="Repeat your password"
        required
    >

    <div class="form-actions">
        <button type="submit">Sign Up</button>
    </div>

</form>

<hr>

<div class="form-footer">
    Already have an account? <a href="{{ url_for('auth.login') }}">Log in here</a>
</div>

{% endblock %}
