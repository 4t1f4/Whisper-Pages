{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}

{% block content %}

<h1>Sign Up</h1>

<form action="{{ url_for('auth.signup') }}" method="POST">

    <input
        type="text"
        name="username"
        placeholder="Username"
        required
    >
    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >
    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >
    <br><br>

    <input
        type="password"
        name="confirm_password"
        placeholder="Confirm Password"
        required
    >
    <br><br>

    <button type="submit">Sign Up</button>

</form>

{% endblock %}
