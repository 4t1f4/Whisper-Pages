{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block extra_css %}
<style>
    .form-header {
        text-align: center;
        margin-bottom: 30px;
    }
    
    .form-footer {
        margin-top: 25px;
        text-align: center;
        font-size: 0.9rem;
        color: var(--text-body);
        opacity: 0.9;
    }

    /* Centers the submit button cleanly */
    .form-actions {
        margin-top: 25px;
        display: flex;
        justify-content: center;
    }
</style>
{% endblock %}

{% block content %}
<div class="form-header">
    <h1>Login</h1>
    <p>Welcome back to your quiet space.</p>
</div>

<form action="{{ url_for('auth.login') }}" method="POST">

    <label for="username">Username</label>
    <input
        type="text"
        oninput="this.value = this.value.toLowerCase();"
        id="username"
        name="username"
        placeholder="Enter your username"
        required
    >

    <label for="password">Password</label>
    <input
        type="password"
        id="password"
        name="password"
        placeholder="Enter your password"
        required
    >

    <div class="form-actions">
        <button type="submit">Login</button>
    </div>

</form>

<hr>

<div class="form-footer">
    New to Whisper Pages? <a href="{{ url_for('auth.signup') }}">Create an account</a>
</div>

{% endblock %}
