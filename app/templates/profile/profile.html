{% extends "base.html" %}
{% block title %}Profile{% endblock %}

{% block content %}

<h1>My Profile</h1>

<hr>

<p>
    <strong>Username:</strong>
    {{ current_user.username }}
</p>

<p>
    <strong>Email:</strong>
    {{ current_user.email }}
</p>

<p>
    <strong>Joined:</strong>
    {{ current_user.created_at }}
</p>

<hr>

<p>
    <a href="{{ url_for('auth.logout') }}">
        Logout
    </a>
</p>

{% endblock %}
